server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- React native frontend (rutas futuras de la SPA) ---
  # Sirve los assets estáticos del build de Vite directamente
  location /assets/ {
    try_files $uri =404;
  }

  # --- Backend Next.js: API + Auth ---
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # --- Backend Next.js: rutas de la plataforma (Next.js pages) ---
  # Todo lo que no sea un asset estático de React va al backend
  location ~ ^/(auth|staff|admin|dashboard|appointments|onboarding|account|guardia|health|prescriptions|telemedicine|quantum-home|landing|_next) {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # --- Root: app real en Next.js backend ---
  location / {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}
