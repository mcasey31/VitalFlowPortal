services:
  db:
    image: postgres:16-alpine
    container_name: prm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pm_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pm_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: prm-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pm_platform
      AUTH_SECRET: ${AUTH_SECRET:-dev_secret_change_me}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-dev_google_client_id}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-dev_google_client_secret}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: prm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
